name: Build LocalCompat IPA

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-13
    steps:
      - name: Set Xcode version
        run: sudo xcode-select -s /Applications/Xcode_14.3.1.app/Contents/Developer
      
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Theos
        uses: Randomblock1/theos-action@v1

      - name: Build Box64 Engine
        run: |
          mkdir -p bin/box64/build_ios
          cd bin/box64/build_ios
          cmake ../source \
            -DCMAKE_TOOLCHAIN_FILE=../ios.toolchain.cmake \
            -DARM64=ON \
            -DIOS=ON \
            -DBUILD_SHARED_LIBS=ON \
            -DCMAKE_BUILD_TYPE=Release
          make -j$(sysctl -n hw.ncpu)
          cp libbox64.dylib ../../../Frameworks/libbox64.dylib

      - name: Build Package
        run: |
          make package FINALPACKAGE=1 DEBUG=0 FOR_RELEASE=1 PACKAGE_FORMAT=ipa

      - name: Locate and Move IPA
        run: |
          IPA_PATH=$(find packages -name "*.ipa" | head -n 1)
          if [ -z "$IPA_PATH" ]; then
            echo "Error: .ipa not found"
            exit 1
          fi
          echo "Found IPA at: $IPA_PATH"
          mv "$IPA_PATH" packages/LocalCompat.ipa

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: LocalCompat-IPA
          path: packages/LocalCompat.ipa
